<!doctype html>

<head>

  <title>游子卦计算器</title>
  <meta name="description" content="游子卦计算器：计算元亨卦、姓名卦与入世卦。" />
  <style>
    :root{--bg:#f6f1e7;--card:#fffaf0;--ink:#211b14;--muted:#746858;--line:#e5dac8;--accent:#8a5a24;--accent-dark:#5f3b12;--danger:#9f2f25;--danger-bg:#fff0ec}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 0%,rgba(138,90,36,.12),transparent 28%),radial-gradient(circle at 100% 20%,rgba(138,90,36,.10),transparent 24%),var(--bg)}.wrap{max-width:980px;margin:0 auto;padding:42px 18px 60px}.hero{text-align:center;margin-bottom:24px}.badge{display:inline-flex;padding:6px 12px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:rgba(255,250,240,.7);font-size:14px}h1{margin:18px 0 10px;font-size:clamp(34px,7vw,64px);letter-spacing:.06em;line-height:1.05}.subtitle{margin:0 auto;max-width:760px;color:var(--muted);line-height:1.8;font-size:16px}.card{background:rgba(255,250,240,.92);border:1px solid var(--line);border-radius:24px;box-shadow:0 22px 70px rgba(64,43,18,.12);padding:24px;margin:18px 0;backdrop-filter:blur(8px)}.form-grid{display:grid;grid-template-columns:1fr;gap:16px}.date-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}label{display:block;margin:0 0 8px;font-weight:700;color:var(--ink)}input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px;color:var(--ink);background:#fffdf8;outline:none}input:focus,select:focus{border-color:rgba(138,90,36,.6);box-shadow:0 0 0 4px rgba(138,90,36,.10)}button{border:0;border-radius:14px;padding:14px 24px;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-dark));cursor:pointer;box-shadow:0 10px 24px rgba(138,90,36,.26)}.hint{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.7}.auto-stroke-panel{display:none;border:1px dashed var(--line);border-radius:18px;padding:16px;background:rgba(255,253,248,.72)}.stroke-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}.stroke-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fffdf8}.stroke-card strong{font-size:26px}.stroke-card span{color:var(--muted);font-weight:800}.error{display:none;margin-top:16px;padding:12px 14px;border:1px solid rgba(159,47,37,.25);background:var(--danger-bg);color:var(--danger);border-radius:14px;line-height:1.7}.result{display:none}.gua-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.gua-box{padding:22px;border:1px solid var(--line);border-radius:20px;background:#fffdf8;text-align:center}.gua-label{color:var(--muted);font-weight:700;letter-spacing:.08em}.gua-name{margin:10px 0 6px;font-size:clamp(36px,7vw,60px);font-weight:900;line-height:1}.gua-code{color:var(--muted);font-size:14px}.explain-card{display:grid;grid-template-columns:180px 1fr;gap:22px;align-items:center;background:linear-gradient(135deg,#fffdf8,#fff7e6)}.qr-box{width:180px;height:180px;border:1px solid var(--line);border-radius:22px;background:#fff;display:flex;align-items:center;justify-content:center;padding:10px}.qr-box a{display:block;width:100%;height:100%}.qr-box img{width:100%;height:100%;object-fit:contain;border-radius:14px}.explain-title{font-size:24px;font-weight:900;margin:0 0 8px}.explain-text{color:var(--muted);line-height:1.8;margin:0}.send-code{margin-top:12px;padding:12px 14px;border-radius:14px;background:rgba(138,90,36,.10);font-weight:900;color:var(--accent-dark);line-height:1.9}.section-title{margin:0 0 14px;font-size:22px}.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.detail{display:flex;justify-content:space-between;gap:14px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fffdf8}.detail span:first-child{color:var(--muted)}.detail span:last-child{font-weight:800;text-align:right}table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:14px;background:#fffdf8}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted)}tr:last-child td{border-bottom:0}.footer{margin-top:26px;text-align:center;font-size:14px;line-height:1.8}.version{display:inline-block;padding:4px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,250,240,.82);color:var(--accent-dark);font-weight:700}code{padding:2px 6px;border-radius:7px;background:rgba(138,90,36,.10)}@media(max-width:760px){.date-grid,.gua-grid,.detail-grid,.explain-card{grid-template-columns:1fr}.qr-box{width:180px;height:180px;margin:0 auto}.wrap{padding-top:28px}.card{padding:18px;border-radius:20px}button{width:100%}}
  </style>

<body>
  <main class="wrap">
    <section class="hero"><div class="badge">诚徵数理文化 · 以数观象 · 以卦明心</div><h1>游子卦计算器</h1><p class="subtitle">输入姓名后自动计算简体笔画；通过标准年月日下拉选择生日。系统按“不补零”规则自动拼接生日数字，并计算元亨卦、姓名卦与入世卦。</p></section>
    <section class="card"><form id="calculatorForm"><div class="form-grid"><div><label for="name">姓名</label><input id="name" name="name" autocomplete="name" placeholder="请输入简体姓名" required /><div class="hint">笔画由浏览器自动计算。若 CDN 加载失败，页面会提示刷新或检查网络。</div></div><div id="autoStrokePanel" class="auto-stroke-panel"><label>自动识别的简体笔画</label><div id="autoStrokePreview" class="stroke-grid"></div></div><div><label>出生日期</label><div class="date-grid"><select id="year" required></select><select id="month" required></select><select id="day" required></select></div></div><button type="submit">开始计算</button></div><div id="error" class="error"></div></form></section>
    <section id="result" class="result"><div class="card"><div class="gua-grid"><div class="gua-box"><div class="gua-label">元亨卦</div><div id="yuanhengName" class="gua-name">-</div><div id="yuanhengCode" class="gua-code">卦码：-</div></div><div class="gua-box"><div class="gua-label">姓名卦</div><div id="nameGuaName" class="gua-name">-</div><div id="nameGuaCode" class="gua-code">卦码：-</div></div><div class="gua-box"><div class="gua-label">入世卦</div><div id="rushiName" class="gua-name">-</div><div id="rushiCode" class="gua-code">卦码：-</div></div></div></div><div class="card explain-card"><div class="qr-box"><a href="http://weixin.qq.com/r/mp/KDjo8PHEqazWrbWT9206" target="_blank" rel="noopener"><img alt="诚徵文化公众号二维码" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANwAAADcAQAAAAAzIfIsAAACiklEQVR42u2YMY7jRhBFX4kLtBw1b9A8iai9l2ZJQhv6EAZ8CkcWZ4P1FRws0Mw2bGYtQOrvQBpvYNjGwAO0DGxFRFfAj19Vv6u/ib+NdcM/xPdktaTMzDrrgMnMtjJrJzPbVkPrpQsZntdjbCL4kUbSo3I728gW2/uRQ8iWgMX2lQC9+/Mr/8C146evv+zxD9B9mt0JwnHOvcbaJes1suX8ZJfl3PMMEHSqB2g1uxXOuwhb1sLVzCoBQrcgAEMcok7+fqRUi6G+nczN7Lh21/78ftms1tl+W42hhFeUpNTEJmb8lIYouWoM/Vs9x5BR8dIlOKn4MeS+ElqkZDrKRTfrGA9k/CTJnaoBKuw4BEI2jeECeOkYM9U63tKn1MwZV2BxUSfg2nu9XccPuoTXMOTnRHDKjSTpAoOkV/XQu7/857+VrJeii/osSSo7TCPVRAoVr0Rwkf4GqFeBQMUpU/ESIbubeBc++GN0qjj2cAiS+3wH5JUI8JiqWXzxRznd6St9GiRVRfspXW3tXL4jbKd2MinX26TUNnLzy8kzQ2pU7VreALY8dduw/Q0AO6H2am+32l1e3/F9auQiJknKO18Y4itF6iOTvd1FZxoDIe/8CGhO+JGaIpV2XjEH+kSQnJJJUsVVwBc/4vRyRdqLaNVUzSZC7iWNsOMDhPyQqrlBraVrD25qJ7ugWRtYXC2R+vaYUWGIBOy2up+q0XdzXNy8ffbWHRYVP/KR8566jgthfZ+a2Mj2a+FQ31TJi/u1vfZPnaaW1Tpfq4deTBULC4y4L+c9ln78+XdzuaqpkpeMl0awhD/O9BWXpfvLUjpGyN+G7yFXu5vlIxWvOETwhaaeJth34/z/lvwDE/fcg8mCs0kAAAAASUVORK5CYII=" /></a></div><div><h2 class="explain-title">关注诚徵文化，获取对应卦词解说</h2><p class="explain-text">点击或长按二维码关注公众号。关注后，分别输入下面三个卦的数字，每次输入一个数字，即可分别获得对应卦词解读。</p><div id="sendCode" class="send-code">请先完成计算</div></div></div><div class="card"><h2 class="section-title">计算明细</h2><div id="details" class="detail-grid"></div></div><div class="card"><h2 class="section-title">姓名笔画</h2><table><thead><tr><th>字</th><th>简体笔画</th></tr></thead><tbody id="strokeRows"></tbody></table></div></section>

  <script src="https://cdn.jsdelivr.net/npm/cnchar@3.2.6/cnchar.min.js"></script><script>const YOUZI_GUA=["坤","复","师","临","谦","明夷","升","泰","豫","震","解","归妹","小过","丰","恒","大壮","比","屯","坎","节","蹇","既济","井","需","萃","随","困","兑","咸","革","大过","夬","剥","颐","蒙","损","艮","贲","蛊","大畜","晋","噬嗑","未济","睽","鼎","离","旅","大有","观","益","涣","中孚","渐","家人","巽","小畜","否","无妄","讼","履","遁","同人","姤","乾"];function ensureStrokeLibraryReady(){if(!window.cnchar||typeof window.cnchar.stroke!=="function")throw new Error("汉字笔画库尚未加载成功，请刷新页面或检查网络。当前页面使用 cnchar 自动计算笔画。")}function normalizeStrokeResult(v){return Array.isArray(v)?Number(v[0]):Number(v)}function getStrokeCount(char){ensureStrokeLibraryReady();const count=normalizeStrokeResult(window.cnchar.stroke(char));if(!Number.isInteger(count)||count<=0)throw new Error(`无法自动识别「${char}」的简体笔画，请确认输入为常用简体汉字。`);return count}function calculateStrokeDetails(name){if(!name)throw new Error("请输入姓名。");return Array.from(name).map(char=>({字:char,笔画:getStrokeCount(char)}))}function updateAutoStrokePreview(){const panel=document.getElementById("autoStrokePanel"),preview=document.getElementById("autoStrokePreview"),error=document.getElementById("error"),name=document.getElementById("name").value.trim();preview.innerHTML="";if(!name){panel.style.display="none";return}try{calculateStrokeDetails(name).forEach(item=>{const card=document.createElement("div");card.className="stroke-card";card.innerHTML=`<strong>${item.字}</strong><span>${item.笔画} 画</span>`;preview.appendChild(card)});panel.style.display="block";error.style.display="none";error.textContent=""}catch(err){panel.style.display="none";error.textContent=err.message;error.style.display="block"}}function populateDateSelectors(){const yearSelect=document.getElementById("year"),monthSelect=document.getElementById("month"),daySelect=document.getElementById("day"),currentYear=new Date().getFullYear();for(let y=currentYear;y>=1900;y--)yearSelect.add(new Option(`${y} 年`,String(y)));for(let m=1;m<=12;m++)monthSelect.add(new Option(`${m} 月`,String(m)));function refreshDays(){const y=Number(yearSelect.value),m=Number(monthSelect.value),oldDay=Number(daySelect.value||1),days=new Date(y,m,0).getDate();daySelect.innerHTML="";for(let d=1;d<=days;d++)daySelect.add(new Option(`${d} 日`,String(d)));daySelect.value=String(Math.min(oldDay,days))}yearSelect.value="1987";monthSelect.value="1";refreshDays();yearSelect.addEventListener("change",refreshDays);monthSelect.addEventListener("change",refreshDays)}function buildBirthdayText(){const year=document.getElementById("year").value,month=document.getElementById("month").value,day=document.getElementById("day").value;if(!year||!month||!day)throw new Error("请选择完整出生日期。");return `${year}${month}${day}`}function normalizeBirthday(birthdayText){const year=Number(birthdayText.slice(0,4)),monthDay=birthdayText.slice(4);return Number(String(year-15)+monthDay)}function numberToBits(n){if(n<0||n>63)throw new Error("卦码必须在 0 到 63 之间。");return Array.from({length:6},(_,i)=>(n>>i)&1)}function bitsToNumber(bits){if(bits.length!==6)throw new Error("六爻列表必须正好包含 6 个元素。");return bits.reduce((sum,bit,i)=>sum+bit*(2**i),0)}function getYouziGuaByCode(code){if(code<0||code>63)throw new Error("游子卦码必须在 0 到 63 之间。");return YOUZI_GUA[code]}function formatBits(bits){return bits.join("")}function calculateYuanhengGua(birthdayText,divisor=61){const originalBirthday=Number(birthdayText),adjustedBirthday=normalizeBirthday(birthdayText),quotient=Math.floor(adjustedBirthday/divisor),remainder=adjustedBirthday%divisor;let yuanhengCode,rule;if(quotient%2===0){yuanhengCode=Math.abs(remainder-63);rule="商为偶数，元亨卦码 = |余数 - 63|"}else{yuanhengCode=remainder;rule="商为奇数，元亨卦码 = 余数"}const yuanhengBits=numberToBits(yuanhengCode);return{原始生日数:originalBirthday,调整后生日数:adjustedBirthday,除数:divisor,商:quotient,余数:remainder,元亨卦计算规则:rule,元亨卦码:yuanhengCode,元亨卦:getYouziGuaByCode(yuanhengCode),元亨卦六爻:yuanhengBits,元亨卦六爻字符串:formatBits(yuanhengBits)}}function calculateNameGua(name,strokeDetails){const totalStrokes=strokeDetails.reduce((sum,item)=>sum+item.笔画,0),nameCode=totalStrokes%64,nameBits=numberToBits(nameCode);return{姓名:name,笔画明细:strokeDetails,姓名总笔画:totalStrokes,姓名卦码:nameCode,姓名卦:getYouziGuaByCode(nameCode),姓名卦六爻:nameBits,姓名卦六爻字符串:formatBits(nameBits)}}function calculateRushiGua(yuanhengCode,nameCode){const yuanhengBits=numberToBits(yuanhengCode),nameBits=numberToBits(nameCode),rushiBits=yuanhengBits.map((bit,i)=>bit^nameBits[i]),rushiCode=bitsToNumber(rushiBits);return{入世卦六爻:rushiBits,入世卦六爻字符串:formatBits(rushiBits),入世卦码:rushiCode,入世卦:getYouziGuaByCode(rushiCode)}}function calculateFullGua(name,birthdayText){const strokeDetails=calculateStrokeDetails(name),yuanheng=calculateYuanhengGua(birthdayText),nameGua=calculateNameGua(name,strokeDetails),rushi=calculateRushiGua(yuanheng.元亨卦码,nameGua.姓名卦码);return{...yuanheng,...nameGua,...rushi}}function addDetail(container,label,value){const item=document.createElement("div");item.className="detail";item.innerHTML=`<span>${label}</span><span>${value}</span>`;container.appendChild(item)}function renderResult(result){document.getElementById("yuanhengName").textContent=result.元亨卦;document.getElementById("yuanhengCode").textContent=`卦码：${result.元亨卦码}`;document.getElementById("nameGuaName").textContent=result.姓名卦;document.getElementById("nameGuaCode").textContent=`卦码：${result.姓名卦码}`;document.getElementById("rushiName").textContent=result.入世卦;document.getElementById("rushiCode").textContent=`卦码：${result.入世卦码}`;document.getElementById("sendCode").innerHTML=`<div>元亨卦数字：${result.元亨卦码}（${result.元亨卦}）</div><div>姓名卦数字：${result.姓名卦码}（${result.姓名卦}）</div><div>入世卦数字：${result.入世卦码}（${result.入世卦}）</div>`;const details=document.getElementById("details");details.innerHTML="";addDetail(details,"姓名",result.姓名);addDetail(details,"原始生日数",result.原始生日数);addDetail(details,"调整后生日数",result.调整后生日数);addDetail(details,"除数",result.除数);addDetail(details,"商",result.商);addDetail(details,"余数",result.余数);addDetail(details,"元亨卦计算规则",result.元亨卦计算规则);addDetail(details,"姓名总笔画",result.姓名总笔画);addDetail(details,"元亨卦六爻",result.元亨卦六爻字符串);addDetail(details,"姓名卦六爻",result.姓名卦六爻字符串);addDetail(details,"入世卦六爻",result.入世卦六爻字符串);const strokeRows=document.getElementById("strokeRows");strokeRows.innerHTML="";result.笔画明细.forEach(item=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${item.字}</td><td>${item.笔画}</td>`;strokeRows.appendChild(tr)});document.getElementById("result").style.display="block"}document.getElementById("name").addEventListener("input",updateAutoStrokePreview);document.getElementById("calculatorForm").addEventListener("submit",event=>{event.preventDefault();const error=document.getElementById("error");error.style.display="none";error.textContent="";try{const name=document.getElementById("name").value.trim(),birthday=buildBirthdayText(),result=calculateFullGua(name,birthday);renderResult(result)}catch(err){document.getElementById("result").style.display="none";error.textContent=err.message;error.style.display="block"}});populateDateSelectors();</script>
</body>
